name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # Lint job: validate composer.json and run parallel-lint on src/ and tests/
  lint:
    name: Lint (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.2", "8.3"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, mysqli, zip

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Run parallel-lint
        run: vendor/bin/parallel-lint --no-progress src/ tests/ --blame

  # PHPStan static analysis — allowed to fail (informational)
  phpstan:
    name: PHPStan (PHP 8.2)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, intl, mysqli, zip

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Run PHPStan
        continue-on-error: true
        run: vendor/bin/phpstan analyse --no-progress --error-format=github src/

  # Unit tests — run without GLPI, on both supported PHP versions
  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        php-version: ["8.2", "8.3"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, mysqli, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite units --no-coverage

  # Integration tests — requires a running GLPI instance and MySQL
  integration-tests:
    name: Integration Tests (PHP 8.2)
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: glpi
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, intl, mysqli, zip
          coverage: none

      - name: Clone GLPI 11.0
        run: git clone --depth 1 --branch 11.0 https://github.com/glpi-project/glpi.git /tmp/glpi

      - name: Install GLPI Composer dependencies
        run: cd /tmp/glpi && composer install --no-progress --prefer-dist --no-scripts

      - name: Install GLPI database
        run: >-
          php /tmp/glpi/bin/console db:install
          --db-name=glpi
          --db-host=127.0.0.1
          --db-user=root
          --db-password=root
          --no-interaction

      - name: Install plugin Composer dependencies
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Run integration tests
        continue-on-error: true
        env:
          GLPI_ROOT: /tmp/glpi
        run: vendor/bin/phpunit --testsuite integration --no-coverage --group integration
